<!DOCTYPE html>
<html>
<head>
  <title>Categorias</title>
</head>
<body>

<h1>Categorias</h1>

<form method="post" action="/categoria">
  <input name="nome" placeholder="Nome">
  <input name="descricao" placeholder="Descrição">
  <button>Criar</button>
</form>

<ul>
  {% for c in categorias %}
    <li>
      {{ c.nome }} - {{ c.descricao }}

      <ul>
        {% for p in c.produtos %}
          <li>{{ p.nome }} - R$ {{ p.preco }}</li>
        {% endfor %}
      </ul>
    </li>
  {% endfor %}
</ul>

<a href="/produtos">Ver produtos</a>

</body>
</html>
